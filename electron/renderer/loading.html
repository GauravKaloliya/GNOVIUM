<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading — Gnovium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .loader-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      object-fit: contain;
    }
    .loader-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="loader">
    <img class="loader-logo" src="gnovium-logo.jpeg" alt="Gnovium" />
    <div class="loader-spinner"></div>
    <div class="loader-text">Loading Gnovium…</div>
  </div>
</body>
</html>
