appId: com.gnovium.app
productName: Gnovium
copyright: Copyright © 2025 Gnovium

directories:
  buildResources: build
  output: out

files:
  - dist/**/*
  - "!node_modules/**/*"

extraMetadata:
  main: dist/main/index.js

mac:
  category: public.app-category.productivity
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Flask backend resources — PyInstaller output will go here
extraResources:
  - from: ../backend/dist/flask_app
    to: backend
    filter:
      - "**/*"
